# MediVision AI - Central Configuration
# Keep all tunables here so python/ code never hardcodes paths or names.

paths:
  data_dir: "data"
  sample_images_dir: "data/sample_images"
  clinical_guidelines_dir: "data/clinical_guidelines"
  chroma_persist_dir: "data/chroma_db"
  model_weights_dir: "python/model/weights"
  trained_weights_file: "python/model/weights/resnet50_chestxray.pth"
  gradcam_output_dir: "data/gradcam_outputs"

model:
  backbone: "resnet50"
  pretrained_imagenet: true
  input_size: 224
  num_classes: 14
  class_names:
    - "Atelectasis"
    - "Cardiomegaly"
    - "Effusion"
    - "Infiltration"
    - "Mass"
    - "Nodule"
    - "Pneumonia"
    - "Pneumothorax"
    - "Consolidation"
    - "Edema"
    - "Emphysema"
    - "Fibrosis"
    - "Pleural_Thickening"
    - "Hernia"
  prediction_threshold: 0.5
  gradcam_target_layer: "layer4"

rag:
  embedding_model: "sentence-transformers/all-MiniLM-L6-v2"
  chroma_collection_name: "clinical_guidelines"
  top_k_retrieval: 3
  chunk_size: 500
  chunk_overlap: 50

llm:
  provider: "ollama"
  ollama_host: "http://localhost:11434"
  model_name: "mistral:7b"
  temperature: 0.2
  max_tokens: 600

training:
  batch_size: 32
  learning_rate: 0.0001
  num_epochs: 10
  val_split: 0.15
  test_split: 0.15
  seed: 42

streamlit:
  page_title: "MediVision AI - Chest X-Ray Diagnostic Assistant"
  page_icon: "🫁"
  layout: "wide"
